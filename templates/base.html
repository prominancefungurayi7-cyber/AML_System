<!doctype html>
<html lang="en" data-theme="{{ request.cookies.get('StanPro-theme', 'dark') }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StanPro Bank | AML Intelligence</title>
    <script>
      (() => {
        const getCookieTheme = () => {
          const themeCookie = document.cookie
            .split("; ")
            .find((row) => row.startsWith("StanPro-theme="));
          return themeCookie ? decodeURIComponent(themeCookie.split("=")[1]) : "";
        };
        const savedTheme = localStorage.getItem("StanPro-theme") || getCookieTheme();
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        const theme = savedTheme || (prefersLight ? "light" : "dark");
        document.documentElement.dataset.theme = theme;
        document.cookie = `StanPro-theme=${encodeURIComponent(theme)}; Max-Age=31536000; Path=/; SameSite=Lax`;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark brand-mark--stacked">
            <span>StanPro</span>
            <span>Bank</span>
          </div>
          <div>
            <p>Banking &bull; Insurance &bull; Investments</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle" type="button" aria-label="Switch to light theme" aria-pressed="false">
            <span class="theme-toggle__track" aria-hidden="true">
              <span class="theme-toggle__thumb"></span>
            </span>
            <span class="theme-toggle__text">Dark</span>
          </button>
        </div>
      </header>

      <main>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flash-messages">
              {% for message in messages %}
                <li>{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      const themeToggle = document.querySelector(".theme-toggle");
      const themeText = document.querySelector(".theme-toggle__text");
      const applyThemeLabel = () => {
        const isLight = document.documentElement.dataset.theme === "light";
        themeToggle.setAttribute("aria-label", `Switch to ${isLight ? "dark" : "light"} theme`);
        themeToggle.setAttribute("aria-pressed", String(isLight));
        themeText.textContent = isLight ? "Light" : "Dark";
      };
      applyThemeLabel();
      themeToggle.addEventListener("click", () => {
        const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem("StanPro-theme", nextTheme);
        document.cookie = `StanPro-theme=${encodeURIComponent(nextTheme)}; Max-Age=31536000; Path=/; SameSite=Lax`;
        applyThemeLabel();
      });

      document.querySelectorAll(".flash-messages").forEach((flash) => {
        window.setTimeout(() => {
          flash.classList.add("is-clearing");
          flash.addEventListener("transitionend", () => flash.remove(), { once: true });
        }, 5000);
      });
    </script>
  </body>
</html>
